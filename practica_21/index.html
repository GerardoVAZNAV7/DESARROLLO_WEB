<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ejercicio 21</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --blue:#1652F0; --teal:#5BBCB8; --yellow:#F5C842; --cream:#E8D5A3; --dark:#0E1A3A; --white:#FAFAF7; --muted:#8DA3C8; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--blue); color:var(--white); font-family:'Nunito',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; }
    h1 { font-family:'Fredoka One',cursive; font-size:2rem; margin-bottom:1.5rem; text-align:center; }
    h1 span { color:var(--teal); }

    .card { background:var(--dark); border:1px solid rgba(91,188,184,.2); border-radius:16px; padding:1.8rem; width:100%; max-width:440px; }

    label { display:block; font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--teal); margin-bottom:.4rem; }

    input {
      width:100%; background:rgba(255,255,255,.06);
      border:1.5px solid rgba(91,188,184,.2); border-radius:8px;
      padding:.7rem 1rem; color:var(--white);
      font-family:'Nunito',sans-serif; font-size:1rem; font-weight:600;
      outline:none; margin-bottom:1rem;
      transition:border-color .2s, box-shadow .2s;
    }
    input:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(91,188,184,.15); }

    .fila { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; margin-bottom:.8rem; }

    button {
      background:var(--yellow); color:var(--dark);
      border:none; padding:.7rem; border-radius:8px;
      font-family:'Nunito',sans-serif; font-size:.85rem; font-weight:800;
      cursor:pointer; transition:background .2s, transform .15s;
    }
    button:hover { background:var(--cream); transform:translateY(-2px); }
    button:active { transform:scale(.97); }

    .resultado {
      margin-top:1.2rem; padding:1rem 1.2rem;
      background:rgba(91,188,184,.08); border:1px dashed rgba(91,188,184,.3);
      border-radius:10px; display:flex; align-items:center; justify-content:space-between;
      min-height:4rem;
    }
    .resultado .op { font-size:.78rem; color:var(--muted); font-weight:700; }
    .resultado .valor { font-family:'Fredoka One',cursive; font-size:2.2rem; color:var(--yellow); }

    .error { font-size:.75rem; color:#f87171; font-weight:700; margin-top:.5rem; min-height:1rem; }
  </style>
</head>
<body>

  <h1>Operaciones con <span>Formulario</span></h1>

  <div class="card">
    <div class="fila">
      <div>
        <label for="a">Variable A</label>
        <input type="number" id="a" value="12" step="any"/>
      </div>
      <div>
        <label for="b">Variable B</label>
        <input type="number" id="b" value="4" step="any"/>
      </div>
    </div>

    <div class="fila">
      <button onclick="calcular('suma')">Suma</button>
      <button onclick="calcular('resta')">Resta</button>
      <button onclick="calcular('division')">Division</button>
      <button onclick="calcular('exponenciacion')">Exponenciacion</button>
    </div>

    <div class="resultado">
      <span class="op" id="etiqueta">Selecciona una operacion</span>
      <span class="valor" id="resultado">—</span>
    </div>
    <p class="error" id="error"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
